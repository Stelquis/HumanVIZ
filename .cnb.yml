# ===================================================================
# 云原生构建配置文件
# ===================================================================

# -----------------------------------------------------------------------------
# 制品推送配置
# -----------------------------------------------------------------------------
main:
  push:
    - services:
        - docker
      stages:
        # 检查是否为主仓库
        - name: check main repo
          script: |
            GIT_REMOTE=$(git remote get-url origin 2>/dev/null || echo "unknown")
            echo "远程仓库: ${GIT_REMOTE}"
            if echo "${GIT_REMOTE}" | grep -qi "oriondawn/HumanVIZ"; then
              echo "IS_MAIN_REPO=true" >> /tmp/build_env
            else
              echo "IS_MAIN_REPO=false" >> /tmp/build_env
            fi

        # 检查配置文件变更
        - name: check config changes
          script: |
            source /tmp/build_env 2>/dev/null || true
            if [[ "${IS_MAIN_REPO}" != "true" ]]; then
              echo "非主仓库，跳过变更检查"
              echo "HAS_CONFIG_CHANGE=false" >> /tmp/build_env
              exit 0
            fi
            
            # 获取与上一个 commit 的变更文件
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            
            echo "变更文件列表:"
            echo "${CHANGED_FILES:-无变更}"
            echo "---"
            
            # 定义需要触发构建的配置文件
            BUILD_TRIGGER_FILES="Dockerfile .cnb.yml"
            
            # 检查是否有配置变更
            HAS_CONFIG_CHANGE="false"
            for file in ${CHANGED_FILES}; do
              for trigger in ${BUILD_TRIGGER_FILES}; do
                if [[ "${file}" == "${trigger}" ]] || [[ "${file}" == *"/${trigger}" ]]; then
                  echo "检测到配置变更: ${file}"
                  HAS_CONFIG_CHANGE="true"
                  break 2
                fi
              done
            done
            
            echo "HAS_CONFIG_CHANGE=${HAS_CONFIG_CHANGE}" >> /tmp/build_env
            
            if [[ "${HAS_CONFIG_CHANGE}" == "true" ]]; then
              echo "将触发镜像构建"
            else
              echo "跳过镜像构建（无配置变更）"
            fi

        # Docker 登录
        - name: docker login
          script: |
            source /tmp/build_env 2>/dev/null || true
            if [[ "${IS_MAIN_REPO}" != "true" ]] || [[ "${HAS_CONFIG_CHANGE}" != "true" ]]; then
              echo "跳过 docker login（不满足构建条件）"
              exit 0
            fi
            docker login -u cnb -p "98lCfekHWg1fac4MQYe6T3xI5JY" docker.cnb.cool

        # Docker 镜像构建（超时: 60分钟）
        - name: docker build
          timeout: 3600s
          script: |
            source /tmp/build_env 2>/dev/null || true
            if [[ "${IS_MAIN_REPO}" != "true" ]] || [[ "${HAS_CONFIG_CHANGE}" != "true" ]]; then
              echo "跳过 docker build（不满足构建条件）"
              exit 0
            fi
            echo "构建镜像: docker.cnb.cool/oriondawn/humanviz:latest"
            docker build -t docker.cnb.cool/oriondawn/humanviz:latest .

        # Docker 镜像推送
        - name: docker push
          script: |
            source /tmp/build_env 2>/dev/null || true
            if [[ "${IS_MAIN_REPO}" != "true" ]] || [[ "${HAS_CONFIG_CHANGE}" != "true" ]]; then
              echo "跳过 docker push（不满足构建条件）"
              exit 0
            fi
            docker push docker.cnb.cool/oriondawn/humanviz:latest
            echo "latest 镜像更新完成"

# -----------------------------------------------------------------------------
# 云原生开发环境配置
# -----------------------------------------------------------------------------
$:
  vscode:
    - name: HumanVIZ
      docker:
        image: docker.cnb.cool/oriondawn/humanviz:latest
      services:
        - vscode
        - docker
      stages:
        # 工作空间初始化
        - name: workspace init
          script: |
            echo "🚀 云原生开发环境已就绪"