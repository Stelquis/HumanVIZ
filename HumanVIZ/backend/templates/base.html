<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
    <title>{% block title %}HumanVIZ{% endblock %}</title>
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 样式 -->
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="bg-decoration"></div>

    <nav class="navbar">
        <div class="navbar-brand">
            <div class="logo">🖥️</div>
            <div class="brand-text">
                <span class="brand-title-main">HumanVIZ</span>
                <span class="brand-subtitle">数据管理中心</span>
            </div>
        </div>
        <div class="navbar-status">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>系统运行中</span>
            </div>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="/HumanVIZ" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">概览</span>
                </a>
                <a href="/HumanVIZ/data" class="nav-item {% if active_page == 'data' %}active{% endif %}">
                    <span class="nav-icon">🗂️</span>
                    <span class="nav-text">数据管理</span>
                </a>
                <a href="/HumanVIZ/preview" class="nav-item {% if active_page == 'preview' %}active{% endif %}">
                    <span class="nav-icon">🔍</span>
                    <span class="nav-text">数据预览</span>
                </a>
                <a href="/HumanVIZ/sql" class="nav-item {% if active_page == 'sql' %}active{% endif %}">
                    <span class="nav-icon">🔎</span>
                    <span class="nav-text">SQL 查询</span>
                </a>
                <a href="/HumanVIZ/import-export" class="nav-item {% if active_page == 'import-export' %}active{% endif %}">
                    <span class="nav-icon">📥📤</span>
                    <span class="nav-text">导入导出</span>
                </a>
                <a href="/HumanVIZ/llm" class="nav-item {% if active_page == 'llm' %}active{% endif %}">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-text">LLM 测试</span>
                </a>
                <a href="/HumanVIZ/colors" class="nav-item {% if active_page == 'colors' %}active{% endif %}">
                    <span class="nav-icon">🎨</span>
                    <span class="nav-text">配色方案</span>
                </a>
                <a href="/HumanVIZ/docs" class="nav-item {% if active_page == 'docs' %}active{% endif %}">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">API 文档</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="version-info">v1.0.0 · FastAPI</div>
            </div>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- 移动端底部导航 -->
    <nav class="mobile-nav">
        <a href="/HumanVIZ" class="mobile-nav-item {% if active_page == 'dashboard' %}active{% endif %}">
            <span class="mobile-nav-icon">📊</span>
            <span>概览</span>
        </a>
        <a href="/HumanVIZ/preview" class="mobile-nav-item {% if active_page == 'preview' %}active{% endif %}">
            <span class="mobile-nav-icon">🔍</span>
            <span>预览</span>
        </a>
        <a href="/HumanVIZ/sql" class="mobile-nav-item {% if active_page == 'sql' %}active{% endif %}">
            <span class="mobile-nav-icon">🔎</span>
            <span>SQL</span>
        </a>
        <a href="/HumanVIZ/import-export" class="mobile-nav-item {% if active_page == 'import-export' %}active{% endif %}">
            <span class="mobile-nav-icon">📥</span>
            <span>导入</span>
        </a>
        <a href="/HumanVIZ/docs" class="mobile-nav-item {% if active_page == 'docs' %}active{% endif %}">
            <span class="mobile-nav-icon">📚</span>
            <span>文档</span>
        </a>
    </nav>

    {% block extra_js %}{% endblock %}
</body>
</html>
