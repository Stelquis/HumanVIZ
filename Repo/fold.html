
<style>
  .root { padding: 1rem 0; font-family: var(--font-sans); }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer; user-select: none;
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--color-background-secondary); }
  .section-header.open { border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0; border-bottom: none; }
  .section-left { display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #B47A3C; flex-shrink: 0; }
  .section-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
  .section-right { display: flex; align-items: center; gap: 14px; }
  .section-stats { font-size: 14px; font-weight: 500; color: #B47A3C; }
  .chevron { font-size: 16px; color: var(--color-text-secondary); transition: transform 0.25s; }
  .chevron.open { transform: rotate(180deg); }

  .section-body {
    border: 0.5px solid var(--color-border-tertiary);
    border-top: none;
    border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease;
  }
  .section-body.open { max-height: 600px; }

  .sub-item { padding: 14px 16px 12px; border-top: 0.5px solid var(--color-border-tertiary); }
  .sub-item:first-child { border-top: none; }
  .sub-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .sub-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-text-secondary); flex-shrink: 0; }
  .sub-left { display: flex; align-items: center; gap: 8px; }
  .sub-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .sub-stats { font-size: 13px; color: var(--color-text-secondary); }
  .sub-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; margin-bottom: 8px; }
  .bar-wrap { height: 3px; background: var(--color-background-secondary); border-radius: 2px; margin-bottom: 8px; }
  .bar { height: 3px; border-radius: 2px; background: #C8956A; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 12px; padding: 3px 10px;
    border-radius: 99px;
    background: #F5EAD8; color: #8B5A2B;
    border: 0.5px solid #DEC4A0;
  }
</style>

<div class="root">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">行当细分详解 — 可折叠面板，点击生行展开子类</h2>

  <div style="margin-bottom: 6px; font-size: 13px; color: var(--color-text-secondary); padding: 0 4px 6px;">行当细分详解</div>

  <div class="section-header open" id="hdr" onclick="toggle()">
    <div class="section-left">
      <span class="dot"></span>
      <span class="section-title">生行</span>
    </div>
    <div class="section-right">
      <span class="section-stats">3,490 人次 &nbsp;44.2%</span>
      <i class="ti ti-chevron-down chevron open" id="chev" aria-hidden="true"></i>
    </div>
  </div>

  <div class="section-body open" id="body">
    <div class="sub-item">
      <div class="sub-header">
        <div class="sub-left"><span class="sub-dot"></span><span class="sub-title">老生</span></div>
        <span class="sub-stats">1,439 人 &nbsp;41.2%</span>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:41.2%"></div></div>
      <div class="sub-desc">中老年男性角色，以唱工为主，嗓音苍劲浑厚。代表角色：诸葛亮、杨继业。</div>
      <div class="tags"><span class="tag">忠义</span><span class="tag">稳重</span><span class="tag">儒雅</span></div>
    </div>
    <div class="sub-item">
      <div class="sub-header">
        <div class="sub-left"><span class="sub-dot"></span><span class="sub-title">小生</span></div>
        <span class="sub-stats">739 人 &nbsp;21.2%</span>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:21.2%"></div></div>
      <div class="sub-desc">青年男性角色，唱腔真假声结合。代表角色：周瑜、许仙。</div>
      <div class="tags"><span class="tag">文雅</span><span class="tag">清秀</span><span class="tag">儒生气</span></div>
    </div>
    <div class="sub-item">
      <div class="sub-header">
        <div class="sub-left"><span class="sub-dot"></span><span class="sub-title">武生</span></div>
        <span class="sub-stats">340 人 &nbsp;9.7%</span>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:9.7%"></div></div>
      <div class="sub-desc">武艺高强的男性角色，重做工与武打。代表角色：赵云、武松。</div>
      <div class="tags"><span class="tag">英勇</span><span class="tag">刚毅</span><span class="tag">武艺高强</span></div>
    </div>
    <div class="sub-item">
      <div class="sub-header">
        <div class="sub-left"><span class="sub-dot"></span><span class="sub-title">末·外·生</span></div>
        <span class="sub-stats">972 人 &nbsp;27.9%</span>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:27.9%"></div></div>
      <div class="sub-desc">传统生行扩展类别，包括末、外等，多为年长配角。代表角色：黄忠、王允。</div>
      <div class="tags"><span class="tag">宽厚</span><span class="tag">持重</span><span class="tag">沉稳</span></div>
    </div>
  </div>
</div>

<script>
function toggle() {
  const hdr = document.getElementById('hdr');
  const body = document.getElementById('body');
  const chev = document.getElementById('chev');
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
  hdr.classList.toggle('open', open);
}
</script>
