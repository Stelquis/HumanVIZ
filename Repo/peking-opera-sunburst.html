<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行当层级分布 — 京剧行当旭日图</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F5F0E8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
    overflow-x: hidden;
  }

  .chart-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  .chart-title {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
    font-size: 26px;
    font-weight: 700;
    color: #5C4A32;
    margin-bottom: 8px;
    letter-spacing: 0.18em;
    text-align: center;
  }

  .chart-subtitle {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    color: #8B7355;
    margin-bottom: 16px;
    letter-spacing: 0.06em;
  }

  #sunburst-container {
    position: relative;
    width: 700px;
    height: 700px;
  }

  svg {
    display: block;
    cursor: default;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(255, 253, 249, 0.97);
    border: 1px solid rgba(184, 149, 111, 0.5);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    color: #3a2c21;
    box-shadow: 0 4px 20px rgba(92, 74, 50, 0.15);
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .tt-name { font-weight: 700; font-size: 15px; color: #3a2c21; margin-bottom: 3px; }
  .tooltip .tt-detail { font-size: 12px; color: #6B5A4A; }
  .tooltip .tt-pct { font-size: 11px; color: #8B7355; margin-top: 1px; }

  .click-hint {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    color: #A09080;
    pointer-events: none;
  }

  .legend {
    display: flex;
    gap: 32px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    color: #5C4A32;
  }
  .legend-dot {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 1px 3px rgba(0,0,0,0.18);
  }
</style>
</head>
<body>

<div class="chart-wrapper">
  <div class="chart-title">行当层级分布</div>
  <div class="chart-subtitle">京剧四大行当 · 子类分层旭日图</div>

  <div id="sunburst-container">
    <svg id="sunburst" viewBox="0 0 700 700" width="700" height="700"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="click-hint" id="click-hint">🖱 点击内环行当查看子类分布 · 点击空白处恢复</div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#C4956A;"></span> 生 Shēng</div>
    <div class="legend-item"><span class="legend-dot" style="background:#C4877A;"></span> 旦 Dàn</div>
    <div class="legend-item"><span class="legend-dot" style="background:#6B8E9F;"></span> 净 Jìng</div>
    <div class="legend-item"><span class="legend-dot" style="background:#7A9E8E;"></span> 丑 Chǒu</div>
  </div>
</div>

<script>
// ============================================================
// DATA — hierarchical structure
// Category values computed from children; center displays 7875
// ============================================================
const DATA = {
  name: "行当",
  children: [
    {
      name: "生", color: "#C4956A", colorSide: "#A07548",
      children: [
        { name: "老生",   value: 1439, color: "#D4B897" },
        { name: "小生",   value: 739,  color: "#DDC4A8" },
        { name: "生",     value: 466,  color: "#CEB190" },
        { name: "武生",   value: 340,  color: "#C9A886" },
        { name: "末",     value: 242,  color: "#E0D0BC" },
        { name: "外",     value: 156,  color: "#E8DBCA" },
        { name: "红生",   value: 108,  color: "#BF9A70" }
      ]
    },
    {
      name: "旦", color: "#C4877A", colorSide: "#9E6059",
      children: [
        { name: "旦",     value: 877,  color: "#D19E97" },
        { name: "老旦",   value: 279,  color: "#D3A9A2" },
        { name: "正旦",   value: 108,  color: "#DBAEA8" },
        { name: "花旦",   value: 96,   color: "#DDBBB6" },
        { name: "彩旦",   value: 74,   color: "#D8B3AD" },
        { name: "武旦",   value: 65,   color: "#C7958E" },
        { name: "贴旦",   value: 55,   color: "#E0C8C3" },
        { name: "青衣",   value: 17,   color: "#C7958E" },
        { name: "花衫",   value: 8,    color: "#DDBBB6" }
      ]
    },
    {
      name: "净", color: "#6B8E9F", colorSide: "#4A6B7A",
      children: [
        { name: "净",     value: 1439, color: "#8CAABB" },
        { name: "副净",   value: 158,  color: "#7E9EB0" },
        { name: "武净",   value: 39,   color: "#7596A8" }
      ]
    },
    {
      name: "丑", color: "#7A9E8E", colorSide: "#587A6E",
      children: [
        { name: "丑",     value: 1110, color: "#9DB9AB" },
        { name: "武丑",   value: 55,   color: "#8CAE9E" },
        { name: "丑旦",   value: 26,   color: "#A5BFB2" }
      ]
    }
  ]
};

// Compute category totals from children
DATA.children.forEach(cat => {
  cat.value = cat.children.reduce((s, ch) => s + ch.value, 0);
});
// Grand total from role data (≈7896); center displays 7875 per design spec
const GRAND_TOTAL = DATA.children.reduce((s, c) => s + c.value, 0);

// Color helper: generate lighter/darker variant
function shadeLighter(hex, amount) {
  const c = d3.hsl(hex);
  c.l = Math.min(0.88, c.l + amount);
  c.s = Math.max(0.18, c.s - amount * 0.5);
  return c.formatHex();
}
function shadeDarker(hex, amount) {
  const c = d3.hsl(hex);
  c.l = Math.max(0.1, c.l - amount);
  c.s = Math.max(0.1, c.s - amount * 0.3);
  return c.formatHex();
}

// ============================================================
// LAYOUT CONSTANTS
// ============================================================
const W = 700, H = 700;
const CX = 345, CY = 330;
const DX = 10, DY = 14;               // 3D perspective offset (right-down)
const CENTER_R = 48;
const INNER_R1 = 58, INNER_R2 = 168;   // inner ring
const GAP_R = 14;
const OUTER_R1 = INNER_R2 + GAP_R;     // outer ring
const OUTER_R2 = 314;
const EXPAND_D = 8;                   // hover expand distance

// ============================================================
// GEOMETRY HELPERS
// ============================================================
function polar(r, angleRad) {
  const a = angleRad - Math.PI / 2; // 0 = 12 o'clock
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

function arcPath(innerR, outerR, a0, a1) {
  const is = polar(innerR, a0), ie = polar(innerR, a1);
  const os = polar(outerR, a0), oe = polar(outerR, a1);
  const la = (a1 - a0) > Math.PI ? 1 : 0;
  return [
    "M", is.x.toFixed(2), is.y.toFixed(2),
    "A", innerR, innerR, "0", la, "1", ie.x.toFixed(2), ie.y.toFixed(2),
    "L", oe.x.toFixed(2), oe.y.toFixed(2),
    "A", outerR, outerR, "0", la, "0", os.x.toFixed(2), os.y.toFixed(2),
    "Z"
  ].join(" ");
}

function arcPathOff(innerR, outerR, a0, a1, dx, dy) {
  const is = polar(innerR, a0), ie = polar(innerR, a1);
  const os = polar(outerR, a0), oe = polar(outerR, a1);
  const la = (a1 - a0) > Math.PI ? 1 : 0;
  return [
    "M", (is.x+dx).toFixed(2), (is.y+dy).toFixed(2),
    "A", innerR, innerR, "0", la, "1", (ie.x+dx).toFixed(2), (ie.y+dy).toFixed(2),
    "L", (oe.x+dx).toFixed(2), (oe.y+dy).toFixed(2),
    "A", outerR, outerR, "0", la, "0", (os.x+dx).toFixed(2), (os.y+dy).toFixed(2),
    "Z"
  ].join(" ");
}

function outerWallPath(outerR, a0, a1) {
  const ts = polar(outerR, a0), te = polar(outerR, a1);
  const bs = { x: ts.x + DX, y: ts.y + DY };
  const be = { x: te.x + DX, y: te.y + DY };
  const la = (a1 - a0) > Math.PI ? 1 : 0;
  return [
    "M", ts.x.toFixed(2), ts.y.toFixed(2),
    "L", bs.x.toFixed(2), bs.y.toFixed(2),
    "A", outerR, outerR, "0", la, "1", be.x.toFixed(2), be.y.toFixed(2),
    "L", te.x.toFixed(2), te.y.toFixed(2),
    "A", outerR, outerR, "0", la, "0", ts.x.toFixed(2), ts.y.toFixed(2),
    "Z"
  ].join(" ");
}

function nodeId(d) {
  if (d.depth === 1) return "cat-" + d.data.name;
  if (d.depth === 2) return "sub-" + d.parent.data.name + "-" + d.data.name;
  return "root";
}

// Expand direction (radial outward, perpendicular to midpoint angle)
function expandVec(d) {
  const ma = (d.x0 + d.x1) / 2 - Math.PI / 2;
  return { tx: (EXPAND_D * Math.cos(ma)).toFixed(2), ty: (EXPAND_D * Math.sin(ma)).toFixed(2) };
}

// ============================================================
// HIERARCHY & PARTITION
// ============================================================
const root = d3.hierarchy(DATA)
  .sum(d => d.value || 0)
  .sort((a, b) => b.value - a.value);

const partition = d3.partition().size([2 * Math.PI, 1]);
partition(root);

// Override radii by depth
root.each(d => {
  if (d.depth === 0)      { d.y0 = 0;          d.y1 = CENTER_R; }
  else if (d.depth === 1) { d.y0 = INNER_R1;   d.y1 = INNER_R2; }
  else if (d.depth === 2) { d.y0 = OUTER_R1;   d.y1 = OUTER_R2; }
});

// Flattened lists
const depth1 = root.descendants().filter(d => d.depth === 1);
const depth2 = root.descendants().filter(d => d.depth === 2);

// ============================================================
// SVG SETUP
// ============================================================
const svg = d3.select("#sunburst");
const chartG = svg.append("g").attr("class", "chart-group");

// Subtle ambient shadow disc
chartG.append("ellipse")
  .attr("cx", CX + DX + 6).attr("cy", CY + DY + 6)
  .attr("rx", OUTER_R2 + 10).attr("ry", OUTER_R2 + 10)
  .attr("fill", "rgba(139,115,85,0.07)");

// ============================================================
// LAYER 0 — SIDE FACES (3D bottom offset) — drawn first
// ============================================================
const sideG = chartG.append("g").attr("class", "side-faces");

const sideD1 = sideG.selectAll(".side-d1")
  .data(depth1).join("path")
  .attr("class", "arc-side side-d1")
  .attr("data-id", d => nodeId(d))
  .attr("fill", d => d.data.colorSide)
  .attr("stroke", "none");

const sideD2 = sideG.selectAll(".side-d2")
  .data(depth2).join("path")
  .attr("class", "arc-side side-d2")
  .attr("data-id", d => nodeId(d))
  .attr("fill", d => shadeDarker(d.data.color, 0.13))
  .attr("stroke", "none");

// ============================================================
// LAYER 1 — OUTER WALLS (3D thickness bands)
// ============================================================
const wallG = chartG.append("g").attr("class", "outer-walls");

// Inner ring outer walls (visible in the gap between rings)
const wallD1 = wallG.selectAll(".wall-d1")
  .data(depth1).join("path")
  .attr("class", "arc-wall wall-d1")
  .attr("data-id", d => nodeId(d))
  .attr("fill", d => shadeDarker(d.data.colorSide, 0.08))
  .attr("stroke", "rgba(0,0,0,0.06)")
  .attr("stroke-width", 0.5);

// Outer ring outer walls (main 3D thickness)
const wallD2 = wallG.selectAll(".wall-d2")
  .data(depth2).join("path")
  .attr("class", "arc-wall wall-d2")
  .attr("data-id", d => nodeId(d))
  .attr("fill", d => shadeDarker(d.data.color, 0.18))
  .attr("stroke", "rgba(0,0,0,0.08)")
  .attr("stroke-width", 0.5);

// ============================================================
// LAYER 2 — TOP FACES (main visible arcs)
// ============================================================
const topG = chartG.append("g").attr("class", "top-faces");

const topD1 = topG.selectAll(".top-d1")
  .data(depth1).join("path")
  .attr("class", "arc-top top-d1")
  .attr("data-id", d => nodeId(d))
  .attr("fill", d => d.data.color)
  .attr("stroke", "#F5F0E8")
  .attr("stroke-width", 2.8)
  .style("cursor", "pointer");

const topD2 = topG.selectAll(".top-d2")
  .data(depth2).join("path")
  .attr("class", "arc-top top-d2")
  .attr("data-id", d => nodeId(d))
  .attr("fill", d => d.data.color)
  .attr("stroke", "#F5F0E8")
  .attr("stroke-width", 2)
  .style("cursor", "pointer");

// Subtle highlight on inner ring top faces
const hlD1 = topG.selectAll(".hl-d1")
  .data(depth1).join("path")
  .attr("class", "arc-hl hl-d1")
  .attr("data-id", d => nodeId(d))
  .attr("fill", "rgba(255,255,255,0.10)")
  .attr("pointer-events", "none");

// ============================================================
// INITIAL PATH DATA (zero-width + full)
// ============================================================
// Compute path strings for all states upfront
function initPathData() {
  [...depth1, ...depth2].forEach(d => {
    const ir = d.y0, or = d.y1;
    d._fullTop  = arcPath(ir, or, d.x0, d.x1);
    d._fullSide = arcPathOff(ir, or, d.x0, d.x1, DX, DY);
    d._fullWall = outerWallPath(or, d.x0, d.x1);
    d._zeroTop  = arcPath(ir, or, d.x0, d.x0);
    d._zeroSide = arcPathOff(ir, or, d.x0, d.x0, DX, DY);
    d._zeroWall = outerWallPath(or, d.x0, d.x0);
  });
  depth1.forEach(d => {
    d._fullHL = arcPath(d.y0+3, (d.y0+d.y1)/2, d.x0+0.004, d.x1-0.004);
    d._zeroHL = arcPath(d.y0+3, (d.y0+d.y1)/2, d.x0+0.004, d.x0+0.004);
  });
}
initPathData();

// Set all arcs to zero-width initially (no flash)
function setZeroState() {
  topD1.attr("d", d => d._zeroTop);
  topD2.attr("d", d => d._zeroTop);
  sideD1.attr("d", d => d._zeroSide);
  sideD2.attr("d", d => d._zeroSide);
  wallD1.attr("d", d => d._zeroWall);
  wallD2.attr("d", d => d._zeroWall);
  hlD1.attr("d", d => d._zeroHL);
}
setZeroState();

// ============================================================
// LABELS
// ============================================================
const labelG = chartG.append("g").attr("class", "labels");

// Inner-ring labels: name + count, white
const labelInner = labelG.selectAll(".lab-d1")
  .data(depth1).join("g")
  .attr("class", "lab-d1")
  .attr("data-id", d => nodeId(d))
  .attr("transform", d => {
    const ma = (d.x0 + d.x1) / 2 - Math.PI / 2;
    const mr = (INNER_R1 + INNER_R2) / 2;
    return `translate(${(CX + mr * Math.cos(ma)).toFixed(1)}, ${(CY + mr * Math.sin(ma)).toFixed(1)})`;
  })
  .attr("pointer-events", "none")
  .style("opacity", 0);

labelInner.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", "-0.3em")
  .attr("fill", "#fff")
  .attr("font-size", "15px")
  .attr("font-weight", "700")
  .attr("font-family", "'Noto Serif SC', 'SimSun', serif")
  .style("text-shadow", "0 1px 4px rgba(0,0,0,0.5)")
  .text(d => d.data.name);

labelInner.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", "1.15em")
  .attr("fill", "rgba(255,255,255,0.9)")
  .attr("font-size", "11px")
  .attr("font-weight", "500")
  .attr("font-family", "'Noto Sans SC', sans-serif")
  .style("text-shadow", "0 1px 3px rgba(0,0,0,0.4)")
  .text(d => d.value.toLocaleString() + "人");

// Outer-ring labels: sub-type name (only if arc arc is wide enough)
const labelOuter = labelG.selectAll(".lab-d2")
  .data(depth2).join("g")
  .attr("class", "lab-d2")
  .attr("data-id", d => nodeId(d))
  .attr("transform", d => {
    const ma = (d.x0 + d.x1) / 2 - Math.PI / 2;
    const mr = (OUTER_R1 + OUTER_R2) / 2;
    return `translate(${(CX + mr * Math.cos(ma)).toFixed(1)}, ${(CY + mr * Math.sin(ma)).toFixed(1)})`;
  })
  .attr("pointer-events", "none")
  .style("opacity", 0);

labelOuter.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", "0.35em")
  .attr("fill", "#3a2c21")
  .attr("font-size", "12px")
  .attr("font-weight", "600")
  .attr("font-family", "'Noto Sans SC', 'SimSun', sans-serif")
  .text(d => {
    const deg = (d.x1 - d.x0) * 180 / Math.PI;
    return deg > 14 ? d.data.name : "";
  });

// ============================================================
// CENTER CIRCLE
// ============================================================
const centerG = chartG.append("g").attr("class", "center-group");

// Center shadow
centerG.append("ellipse")
  .attr("cx", CX + 4).attr("cy", CY + 5)
  .attr("rx", CENTER_R + 2).attr("ry", CENTER_R + 2)
  .attr("fill", "rgba(180,160,140,0.22)");

// Center disc
centerG.append("circle")
  .attr("cx", CX).attr("cy", CY)
  .attr("r", CENTER_R)
  .attr("fill", "#FDF9F2")
  .attr("stroke", "rgba(184,160,135,0.4)")
  .attr("stroke-width", 1.5)
  .style("cursor", "pointer");

// Center inner ring
centerG.append("circle")
  .attr("cx", CX).attr("cy", CY)
  .attr("r", CENTER_R - 6)
  .attr("fill", "none")
  .attr("stroke", "rgba(184,160,135,0.22)")
  .attr("stroke-width", 1);

// Center number
centerG.append("text")
  .attr("x", CX).attr("y", CY - 3)
  .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
  .attr("fill", "#5C4A32")
  .attr("font-family", "'Noto Serif SC', 'SimSun', serif")
  .attr("font-size", "24px").attr("font-weight", "700")
  .text("7875");

// Center subtitle
centerG.append("text")
  .attr("x", CX).attr("y", CY + 19)
  .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
  .attr("fill", "#A09080")
  .attr("font-family", "'Noto Sans SC', sans-serif")
  .attr("font-size", "11px")
  .text("角色人次");

centerG.selectAll("circle, text").style("opacity", 0);

// ============================================================
// TOOLTIP LOGIC
// ============================================================
const tooltipEl = d3.select("#tooltip");
const containerEl = document.getElementById("sunburst-container");

function showTooltip(event, d) {
  const rect = containerEl.getBoundingClientRect();
  const pct = d.value ? ((d.value / GRAND_TOTAL) * 100).toFixed(1) : "0.0";
  let html = `<div class="tt-name">${d.data.name}</div>`;
  html += `<div class="tt-detail">${d.value.toLocaleString()} 人次 · 占比 ${pct}%</div>`;
  if (d.depth === 1) {
    const nSub = d.children ? d.children.length : 0;
    html += `<div class="tt-pct">${nSub} 个子类 · 点击筛选</div>`;
  } else if (d.depth === 2) {
    html += `<div class="tt-pct">所属行当：${d.parent.data.name}</div>`;
  }
  tooltipEl.html(html).classed("visible", true);
  tooltipEl
    .style("left", (event.clientX - rect.left + 18) + "px")
    .style("top",  (event.clientY - rect.top - 54) + "px");
}

function moveTooltip(event) {
  const rect = containerEl.getBoundingClientRect();
  tooltipEl
    .style("left", (event.clientX - rect.left + 18) + "px")
    .style("top",  (event.clientY - rect.top - 54) + "px");
}

function hideTooltip() {
  tooltipEl.classed("visible", false);
}

// ============================================================
// INTERACTION STATE
// ============================================================
let activeCat = null;

function resetFilter() {
  activeCat = null;
  const t = d3.transition().duration(520).ease(d3.easeCubicOut);

  topD1.transition(t).attr("opacity", 1);
  topD2.transition(t).attr("opacity", 1);
  sideD1.transition(t).attr("opacity", 1);
  sideD2.transition(t).attr("opacity", 1);
  wallD1.transition(t).attr("opacity", 1);
  wallD2.transition(t).attr("opacity", 1);
  hlD1.transition(t).attr("opacity", 1);
  labelInner.transition(t).style("opacity", 1);
  labelOuter.transition(t).style("opacity", 1);

  d3.select("#click-hint")
    .transition().duration(400)
    .style("opacity", 1)
    .text("🖱 点击内环行当查看子类分布 · 点击空白处恢复");
}

function filterCategory(catName) {
  activeCat = catName;
  const t = d3.transition().duration(520).ease(d3.easeCubicOut);

  topD1.transition(t).attr("opacity", d => d.data.name === catName ? 1 : 0.3);
  sideD1.transition(t).attr("opacity", d => d.data.name === catName ? 1 : 0.3);
  wallD1.transition(t).attr("opacity", d => d.data.name === catName ? 1 : 0.15);
  hlD1.transition(t).attr("opacity", d => d.data.name === catName ? 1 : 0);

  topD2.transition(t).attr("opacity", d => d.parent.data.name === catName ? 1 : 0.15);
  sideD2.transition(t).attr("opacity", d => d.parent.data.name === catName ? 1 : 0.08);
  wallD2.transition(t).attr("opacity", d => d.parent.data.name === catName ? 1 : 0.06);

  labelInner.transition(t).style("opacity", d => d.data.name === catName ? 1 : 0.25);
  labelOuter.transition(t).style("opacity", d => d.parent.data.name === catName ? 1 : 0.08);

  d3.select("#click-hint")
    .transition().duration(400)
    .style("opacity", 1)
    .text(`已筛选「${catName}」行当 · 点击空白处恢复全部`);
}

// ============================================================
// HOVER HANDLERS
// ============================================================
function onEnter(event, d) {
  const v = expandVec(d);
  const id = nodeId(d);

  // Expand top arc
  topG.selectAll(`[data-id="${id}"]`)
    .transition().duration(200).ease(d3.easeCubicOut)
    .attr("transform", `translate(${v.tx}, ${v.ty})`);

  // Expand side arc + brighten
  sideG.selectAll(`[data-id="${id}"]`)
    .transition().duration(200).ease(d3.easeCubicOut)
    .attr("transform", `translate(${v.tx}, ${v.ty})`)
    .attr("fill", dd => shadeLighter(dd.data.colorSide || dd.data.color, 0.12));

  // Expand wall
  wallG.selectAll(`[data-id="${id}"]`)
    .transition().duration(200).ease(d3.easeCubicOut)
    .attr("transform", `translate(${v.tx}, ${v.ty})`);

  // Subtle brightness on top face
  topG.selectAll(`.arc-top[data-id="${id}"]`)
    .attr("filter", "brightness(1.08)");

  showTooltip(event, d);
}

function onLeave(event, d) {
  const id = nodeId(d);

  topG.selectAll(`[data-id="${id}"]`)
    .transition().duration(320).ease(d3.easeCubicOut)
    .attr("transform", "translate(0, 0)")
    .attr("filter", null);

  // Restore side color
  sideD2.filter(function(dd) { return nodeId(dd) === id; })
    .transition().duration(320).ease(d3.easeCubicOut)
    .attr("fill", dd => shadeDarker(dd.data.color, 0.13));

  sideD1.filter(function(dd) { return nodeId(dd) === id; })
    .transition().duration(320).ease(d3.easeCubicOut)
    .attr("fill", dd => dd.data.colorSide);

  sideG.selectAll(`[data-id="${id}"]`)
    .transition().duration(320).ease(d3.easeCubicOut)
    .attr("transform", "translate(0, 0)");

  wallG.selectAll(`[data-id="${id}"]`)
    .transition().duration(320).ease(d3.easeCubicOut)
    .attr("transform", "translate(0, 0)");

  hideTooltip();
}

// Attach hover to top faces (the interactive surface)
topD1.on("mouseenter", onEnter).on("mousemove", moveTooltip).on("mouseleave", onLeave);
topD2.on("mouseenter", onEnter).on("mousemove", moveTooltip).on("mouseleave", onLeave);

// Click: inner ring arcs filter sub-types
topD1.on("click", function(event, d) {
  event.stopPropagation();
  if (activeCat === d.data.name) resetFilter();
  else filterCategory(d.data.name);
});

// Click on center resets
centerG.on("click", function(event) {
  event.stopPropagation();
  if (activeCat) resetFilter();
});

// Click on blank SVG area resets
svg.on("click", function(event) {
  if (event.target === this || event.target === svg.node()) {
    if (activeCat) resetFilter();
  }
});

// ============================================================
// ENTRANCE ANIMATION — clockwise 0° → full, 800ms ease-out
// ============================================================
function animateEntrance() {
  // Sort by angular position for clockwise stagger
  const allArcs = [...depth1, ...depth2].sort((a, b) => a.x0 - b.x0);
  const totalDur = 800;
  const maxStagger = 480;

  // Animate all layer groups in parallel, staggered by angle
  function animateSelection(sel, fullProp, dur, delayFn) {
    sel.each(function(d) {
      const delay = delayFn(d);
      d3.select(this)
        .transition()
        .delay(delay)
        .duration(Math.max(100, dur - delay))
        .ease(d3.easeCubicOut)
        .attr("d", d[fullProp]);
    });
  }

  function angleDelay(d) { return (d.x0 / (2 * Math.PI)) * maxStagger; }
  function angleDelayOuter(d) { return angleDelay(d) + 120; }

  // Top faces
  topD1.each(function(d) {
    d3.select(this).transition().delay(angleDelay(d)).duration(Math.max(120, totalDur - angleDelay(d)))
      .ease(d3.easeCubicOut).attr("d", d._fullTop);
  });
  topD2.each(function(d) {
    d3.select(this).transition().delay(angleDelayOuter(d)).duration(Math.max(120, totalDur - angleDelayOuter(d) + 80))
      .ease(d3.easeCubicOut).attr("d", d._fullTop);
  });

  // Side faces
  sideD1.each(function(d) {
    d3.select(this).transition().delay(angleDelay(d)).duration(Math.max(120, totalDur - angleDelay(d)))
      .ease(d3.easeCubicOut).attr("d", d._fullSide);
  });
  sideD2.each(function(d) {
    d3.select(this).transition().delay(angleDelayOuter(d)).duration(Math.max(120, totalDur - angleDelayOuter(d) + 80))
      .ease(d3.easeCubicOut).attr("d", d._fullSide);
  });

  // Walls
  wallD1.each(function(d) {
    d3.select(this).transition().delay(angleDelay(d)).duration(Math.max(120, totalDur - angleDelay(d)))
      .ease(d3.easeCubicOut).attr("d", d._fullWall);
  });
  wallD2.each(function(d) {
    d3.select(this).transition().delay(angleDelayOuter(d)).duration(Math.max(120, totalDur - angleDelayOuter(d) + 80))
      .ease(d3.easeCubicOut).attr("d", d._fullWall);
  });

  // Highlight arcs
  hlD1.each(function(d) {
    d3.select(this).transition().delay(angleDelay(d)).duration(Math.max(120, totalDur - angleDelay(d)))
      .ease(d3.easeCubicOut).attr("d", d._fullHL);
  });

  // Labels fade in after arcs
  labelInner.transition().delay(640).duration(360).ease(d3.easeCubicOut).style("opacity", 1);
  labelOuter.transition().delay(720).duration(360).ease(d3.easeCubicOut).style("opacity", 1);

  // Center circle scale in
  centerG.selectAll("circle, text")
    .transition().delay(180).duration(520).ease(d3.easeCubicOut)
    .style("opacity", 1);
}

// Kick off entrance animation
animateEntrance();
